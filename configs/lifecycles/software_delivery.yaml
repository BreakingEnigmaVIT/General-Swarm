# Software Delivery Lifecycle Definition
# §19.1 — Ordered phases with entry/exit artifact contracts, budget splits, approval gates.
#
# Iteration routes back to Planning or Build depending on ReleaseDecision.routing_phase.

name: software_delivery
description: >
  End-to-end product delivery lifecycle: from idea to deployed, monitored service
  with a closed feedback loop.

# Global budget allocation (percentages must sum to ≤ 100)
budget_allocation:
  discovery:    8
  planning:     8
  architecture: 10
  contracting:  5
  build:        20
  live_test:    10
  quality:      12
  deployment:   10
  post_launch:  10
  iteration:    7

phases:
  - id: discovery
    name: Discovery
    description: >
      Understand the market, competitors, and user pain points. Produce a
      ProductBrief and MarketResearch that ground all downstream decisions.
    default_agents:
      - market_research
      - memory_agent
    required_input_artifact_types: []       # first phase: only the user goal
    required_output_artifact_types:
      - ProductBrief
      - MarketResearch
    human_approval_gate: false
    on_failure: abort

  - id: planning
    name: Planning
    description: >
      Translate research into a structured PRD with prioritised requirements,
      acceptance criteria, and an explicit out-of-scope list.
    default_agents:
      - product_manager
      - critic
      - memory_agent
    required_input_artifact_types:
      - ProductBrief
      - MarketResearch
    required_output_artifact_types:
      - PRD
    human_approval_gate: true
    on_failure: abort

  - id: architecture
    name: Architecture
    description: >
      Define system components, tech stack, API contracts, and data model.
      Produce diagrams as Mermaid source artifacts.
    default_agents:
      - architecture
      - security_engineer
      - memory_agent
    required_input_artifact_types:
      - PRD
    required_output_artifact_types:
      - ArchitectureDoc
      - APISpec
      - DBSchema
    human_approval_gate: true
    on_failure: abort

  - id: contracting
    name: Contracting
    description: >
      Generate the Contract-Driven Development (CDD) document that governs the
      entire build phase. The chief_orchestrator calls the contractor tool with
      context from ArchitectureDoc, APISpec, and DBSchema. The resulting
      CDDContract artifact is the single source of truth for every API
      interaction between frontend and backend. Neither engineer may write code
      until this artifact is approved.
    default_agents:
      - chief_orchestrator
    required_input_artifact_types:
      - ArchitectureDoc
      - APISpec
      - DBSchema
    required_output_artifact_types:
      - CDDContract
    human_approval_gate: true
    on_failure: abort

  - id: build
    name: Build
    description: >
      Generate frontend, backend, database, and integration code. Every change
      is a CodeChangeSet artifact; no direct commits. Both engineers MUST read
      the CDDContract artifact before writing any code — it is the authoritative
      API specification.
    default_agents:
      - frontend_engineer
      - backend_engineer
      - database_engineer
      - integration_engineer
      - memory_agent
    required_input_artifact_types:
      - PRD
      - ArchitectureDoc
      - APISpec
      - DBSchema
      - CDDContract
    required_output_artifact_types:
      - CodeChangeSet
    human_approval_gate: false
    on_failure: abort

  - id: live_test
    name: Live Test
    description: >
      Start the built backend in a venv and the frontend dev server, run live
      CRUD smoke tests, and loop through the debug agent until all checks pass
      or 3 fix cycles are exhausted.
    default_agents:
      - live_test
    required_input_artifact_types:
      - CodeChangeSet
    required_output_artifact_types:
      - LiveTestReport
    human_approval_gate: false
    on_failure: abort

  - id: quality
    name: Quality
    description: >
      Run tests, static analysis, dependency audit, secret scan, and code review.
      Critical/High security findings block progression.
    default_agents:
      - qa_engineer
      - security_engineer
      - code_reviewer
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
      - PRD
    required_output_artifact_types:
      - TestReport
      - SecurityReport
      - CodeReviewReport
    human_approval_gate: true
    on_failure: abort

  - id: deployment
    name: Deployment
    description: >
      Generate CI/CD pipelines, build images, and deploy via the declared
      rollout strategy. All production-touching actions require human approval.
    default_agents:
      - devops_engineer
      - deployment_engineer
      - memory_agent
    required_input_artifact_types:
      - CodeChangeSet
      - ArchitectureDoc
    required_output_artifact_types:
      - DeploymentPlan
      - DeploymentRecord
    human_approval_gate: true
    prod_risk: true
    skip_without_deploy: true   # skipped when --no-deploy (default)
    on_failure: abort

  - id: post_launch
    name: Post-Launch
    description: >
      Monitor live service against SLOs. Collect and cluster user feedback.
      Emit IncidentRecords on SLO breach; trigger rollback with human approval.
    default_agents:
      - sre_engineer
      - observability
      - user_feedback
      - memory_agent
    required_input_artifact_types:
      - DeploymentRecord
      - MonitoringConfig
    required_output_artifact_types:
      - FeedbackDigest
    human_approval_gate: false
    skip_without_deploy: true   # skipped when --no-deploy (default)
    on_failure: abort

  - id: iteration
    name: Iteration
    description: >
      Analyse signals (feedback, incidents, test failures) and decide: hotfix
      (back to build), minor update (back to planning), or major rework (back to
      discovery). Routes through the Chief Orchestrator.
    default_agents:
      - iteration
      - chief_orchestrator
      - memory_agent
    required_input_artifact_types:
      - FeedbackDigest
    required_output_artifact_types:
      - ReleaseDecision
    human_approval_gate: true
    on_failure: abort

# Transition table — overrides the default linear order.
# source phase → list of possible target phases (first match wins on condition).
transitions:
  - from: quality
    to: build
    condition: test_report_failing        # QA agent verdict: tests failing

  - from: quality
    to: iteration
    condition: security_blocks            # SecurityReport.blocks_progression = true

  - from: iteration
    to: discovery
    condition: release_decision_major_respec

  - from: iteration
    to: planning
    condition: release_decision_minor_update

  - from: iteration
    to: build
    condition: release_decision_hotfix
