# Declares environment variables referenced by tools (documentation + validation hints).
# Values are never stored here — only names and sensitivity.

CLOUDSDK_CORE_PROJECT:
  sensitivity: optional
  description: Overrides default GCP project for gcloud when --project is omitted upstream.

GOOGLE_APPLICATION_CREDENTIALS:
  sensitivity: optional
  description: Path to service-account JSON for Application Default Credentials when not using Workload Identity.
